<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Recognition Based Attendance Management System</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #F8FAFC;
      color: #1E3A8A;
      overflow-x: hidden;
      position: relative;
    }

    .navbar {
      background: linear-gradient(135deg, #1E3A8A, #7C3AED);
      padding: 1.8rem 3rem;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      transition: all 0.4s ease;
      min-height: 80px;
    }

    .navbar.scrolled {
      background: linear-gradient(135deg, #1E40AF, #06B6D4);
      transform: scale(1.01);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      color: #FFFFFF;
      font-size: 2rem;
      font-weight: bold;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 5px #353a4b;
    }

    .nav-menu {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-btn {
      color: #FFFFFF;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(124, 58, 237, 0.2);
      top: 0;
      left: -100%;
      transition: all 0.4s ease;
    }

    .nav-btn:hover::after {
      left: 0;
    }

    .nav-btn:hover {
      background-color: rgba(30, 64, 175, 0.2);
      transform: translateY(-2px);
    }

    .active {
      background-color: #BFDBFE;
      color: #1E3A8A;
      box-shadow: 0 0 0 0 rgba(191, 219, 254, 0.7);
    }

    .menu-toggle {
      display: none;
      color: #FFFFFF;
      font-size: 2rem;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      .nav-menu {
        display: none;
        flex-direction: column;
        background: #FFFFFF;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        padding: 1rem;
        border-top: 1px solid #7C3AED;
      }

      .nav-menu.active {
        display: flex;
      }
    }

    .main-content {
      margin-top: 120px;
      padding: 60px 20px;
      text-align: center;
      background-color: #FFFFFF;
      border-radius: 12px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2.8rem;
      color: #6D28D9;
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 5px #1E3A8A;
    }

    h2 {
      margin-top: 40px;
      font-size: 1.8rem;
      color: #06B6D4;
      position: relative;
    }

    h2::after {
      content: '';
      position: absolute;
      width: 50px;
      height: 3px;
      background: #06B6D4;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
    }

    p,
    li {
      margin-top: 10px;
      font-size: 1.15rem;
      color: #1E3A8A;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li::before {
      content: "📑";
      margin-right: 8px;
    }

    footer {
      background-color: #1E3A8A;
      color: #FFFFFF;
      padding: 30px 20px;
      text-align: center;
    }

    .footer-bottom {
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #1E3A8A;
    }

    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #1E3A8A;
      border-radius: 4px;
    }

    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    #video {
      width: 100%;
      margin-top: 10px;
      border: 1px solid #1E3A8A;
      border-radius: 4px;
    }

    .messages {
      margin-bottom: 20px;
    }

    .messages .error {
      color: red;
    }

    .messages .success {
      color: green;
    }
  </style>
</head>

<body>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a class="nav-logo">Face Attendance System</a>
      <div class="menu-toggle" id="mobileMenu">☰</div>
      <div class="nav-menu" id="navMenu">
        <a href="/" class="nav-btn"><i class="fas fa-home"></i> Home</a>
        <a href="studentLogin" class="nav-btn"><i class="fas fa-user-graduate"></i> Student Attedence</a>
        <a href="facultyLogin" class="nav-btn"><i class="fas fa-chalkboard-teacher"></i> Faculty Login</a>
        <a href="studentRegister" class="nav-btn active"><i class="fas fa-user-plus"></i> Student Registration</a>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <h1>Student Registration</h1>
    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <p class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
      {% endfor %}
    </div>
    {% endif %}
    <form id="userForm" action="{% url 'student_register' %}" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="loginid">Login ID:</label>
        <input type="text" id="loginid" name="loginid" required>
      </div>
      <div class="form-group">
        <label for="mobile">Mobile:</label>
        <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group">
        <label for="department">Department:</label>
        <select id="department" name="department" required
          style="width: 100%; padding: 8px; border: 1px solid #1E3A8A; border-radius: 4px;">
          <option value="" disabled selected>Select Department</option>
          <option value="CSE">CSE</option>
          <option value="ECE">ECE</option>
          <option value="MECH">MECH</option>
          <option value="CIVIL">CIVIL</option>
          <option value="EEE">EEE</option>
          <option value="AI&DS">AI&DS</option>
        </select>
      </div>
      <div class="form-group">
        <label for="year">Year:</label>
        <select id="year" name="year" required
          style="width: 100%; padding: 8px; border: 1px solid #1E3A8A; border-radius: 4px;">
          <option value="" disabled selected>Select Year</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>
      <div class="form-group">
        <label for="semester">Semester:</label>
        <select id="semester" name="semester" required
          style="width: 100%; padding: 8px; border: 1px solid #1E3A8A; border-radius: 4px;">
          <option value="" disabled selected>Select Semester</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>
      <div class="form-group">
        <label for="section">Section:</label>
        <select id="section" name="section" required
          style="width: 100%; padding: 8px; border: 1px solid #1E3A8A; border-radius: 4px;">
          <option value="" disabled selected>Select Section</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>
      </div>
      <div class="form-group">
        <label>Camera Access:</label>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display: none;"></canvas>
      </div>
      <button type="submit">Submit</button>
    </form>
  </div>

  <footer>
    <div class="footer-bottom">
      © 2025 Face Recognition Attendance | Powered by DeepVision AI
    </div>
  </footer>

  <script>
    // Navigation and Token Flow Scripts
    document.addEventListener('DOMContentLoaded', () => {
      const mobileMenu = document.getElementById('mobileMenu');
      const navMenu = document.getElementById('navMenu');
      const navbar = document.getElementById('navbar');
      const navLinks = document.querySelectorAll('.nav-btn');
      const currentPath = window.location.pathname;
      const tokenFlowContainer = document.getElementById('tokenFlowContainer');

      mobileMenu.addEventListener('click', () => {
        navMenu.classList.toggle('active');
      });

      navLinks.forEach(link => {
        if (link.getAttribute('href') === currentPath) {
          link.classList.add('active');
        }
      });

      window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 10);
      });

      function createTokenFlow() {
        const phrases = [
          "🧠 FaceNet Embeddings...",
          "🎥 Live Detection...",
          "🧬 CNN Features...",
          "🔐 Secure Auth...",
          "📊 Attendance Logs...",
          "🎓 Faculty Dashboard...",
          "📸 OpenCV Frames...",
          "⚙️ Smart Matching...",
          "🌐 Deep Learning Flow..."
        ];
        const token = document.createElement('div');
        token.classList.add('token-flow');
        token.textContent = phrases[Math.floor(Math.random() * phrases.length)];
        token.style.left = `${Math.random() * 80 + 10}vw`;
        token.style.top = `${Math.random() * 100}vh`;
        tokenFlowContainer.appendChild(token);

        setTimeout(() => {
          token.remove();
        }, 6000);
      }

      setInterval(createTokenFlow, 800);
    });

    // Form and Camera Scripts
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const form = document.getElementById('userForm');
    const loginIdInput = document.getElementById('loginid');
    let stream;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' }
        });
        video.srcObject = stream;
      } catch (err) {
        console.error('Error accessing camera:', err);
        alert('Could not access camera. Please ensure camera permissions are granted.');
      }
    }

    function captureImage() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg');
    }

    async function captureMultipleImages() {
      const images = [];
      const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

      for (let i = 0; i < 50; i++) {
        const imageData = captureImage();
        images.push(imageData);
        await delay(100);
      }
      return images;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const images = await captureMultipleImages();
        const formData = new FormData(form);
        const loginId = loginIdInput.value.trim();
        images.forEach((image, index) => {
          const byteString = atob(image.split(',')[1]);
          const mimeString = image.split(',')[0].split(':')[1].split(';')[0];
          const ab = new ArrayBuffer(byteString.length);
          const ia = new Uint8Array(ab);
          for (let i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
          }
          const blob = new Blob([ab], { type: mimeString });
          formData.append('images', blob, `image_${index + 1}.jpg`);
        });

        const response = await fetch("{% url 'student_register' %}", {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          window.location.href = "{% url 'index' %}";
        } else {
          alert('Error submitting form. Please try again.');
        }
      } catch (err) {
        console.error('Error during form submission:', err);
        alert('An error occurred. Please try again.');
      }
    });

    startCamera();
  </script>
</body>

</html>
